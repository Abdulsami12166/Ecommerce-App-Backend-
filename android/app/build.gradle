apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Config
 */
react {

    debuggableVariants = []

    def jsEntryFile

    if (project.hasProperty('entryFile')) {

        jsEntryFile = project.entryFile

    } else {

        def taskNames = gradle.startParameter.taskNames.join(' ').toLowerCase()

        if (
            taskNames.contains('admindebug') ||
            taskNames.contains('installadmindebug') ||
            taskNames.contains('bundleadmindebugjsandassets') ||
            taskNames.contains('assembleadmindebug')
        ) {

            jsEntryFile = "admin-app/index.js"

        } else {

            jsEntryFile = "index.js"
        }
    }

    if (!jsEntryFile.startsWith('/') && !jsEntryFile.startsWith('../../')) {
        jsEntryFile = "../../" + jsEntryFile
    }

    entryFile = file(jsEntryFile)

    autolinkLibrariesWithApp()
}

/**
 * Enable Proguard
 */
def enableProguardInReleaseBuilds = false

/**
 * JSC Flavor
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {

    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.ecommerce"

    defaultConfig {

        applicationId "com.ecommerce"

        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        versionCode 1
        versionName "1.0"

        multiDexEnabled true
    }

    flavorDimensions "app"

    productFlavors {

        ecommerce {

            dimension "app"

            applicationId "com.ecommerce"

            manifestPlaceholders = [
                appLabel: "Ecommerce"
            ]

            resValue "string", "app_name", "Ecommerce"
        }

        admin {

            dimension "app"

            applicationId "com.ecommerce.admin"

            manifestPlaceholders = [
                appLabel: "Ecommerce Admin"
            ]

            resValue "string", "app_name", "Ecommerce Admin"
        }
    }

    packagingOptions {

        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/libfbjni.so'
    }

    signingConfigs {

        debug {

            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {

        debug {
            signingConfig signingConfigs.debug
        }

        release {

            signingConfig signingConfigs.debug

            minifyEnabled enableProguardInReleaseBuilds

            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {

    implementation("com.facebook.react:react-android")

    implementation 'androidx.multidex:multidex:2.0.1'

    if (hermesEnabled.toBoolean()) {

        implementation("com.facebook.react:hermes-android")

    } else {

        implementation jscFlavor
    }
}